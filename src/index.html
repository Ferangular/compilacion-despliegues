<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Compilación y Despliegues - Laboratorio de Optimización</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Preloading de fuentes críticas para optimización -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" />
    </noscript>

    <!-- Preloading de fuentes WOFF2 -->
    <link
      rel="preload"
      href="assets/fonts/inter-v12-latin-regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />

    <!-- Optimización para SEO y redes sociales -->
    <meta name="description" content="Laboratorio de optimización de assets - Imágenes, fuentes y CDN" />
    <meta name="keywords" content="optimización, assets, imágenes, fuentes, CDN, rendimiento, Angular" />

    <!-- Open Graph para redes sociales -->
    <meta property="og:title" content="Laboratorio de Optimización de Assets" />
    <meta property="og:description" content="Pruebas de optimización de imágenes, fuentes y CDN" />
    <meta property="og:type" content="website" />

    <!-- DNS prefetch para CDNs -->
    <link rel="dns-prefetch" href="//res.cloudinary.com" />
    <link rel="dns-prefetch" href="//assets.imgix.net" />
    <link rel="dns-prefetch" href="//ik.imagekit.io" />
    <link rel="dns-prefetch" href="//imagedelivery.net" />

    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Font Display Strategy -->
    <style>
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src:
          local('Inter'),
          local('Inter-Regular'),
          url('https://fonts.gstatic.com/s/inter/v12/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfAZ9hiA.woff2')
            format('woff2');
      }

      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src:
          local('Inter Bold'),
          local('Inter-Bold'),
          url('https://fonts.gstatic.com/s/inter/v12/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuGKYAZ9hiA.woff2')
            format('woff2');
      }

      /* Fallback fonts mientras cargan las fuentes optimizadas */
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      }

      /* Prevenir Flash of Invisible Text (FOIT) */
      .font-loading {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      /* Cuando las fuentes cargan */
      .font-loaded {
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }
    </style>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="manifest" href="manifest.webmanifest" />
  </head>
  <body class="font-loading">
    <app-root></app-root>

    <script>
      // Detectar cuando las fuentes han cargado
      document.fonts.ready.then(function () {
        document.body.classList.remove('font-loading');
        document.body.classList.add('font-loaded');
      });

      // Fallback para navegadores que no soportan document.fonts
      setTimeout(function () {
        document.body.classList.remove('font-loading');
        document.body.classList.add('font-loaded');
      }, 1000);
    </script>
  </body>
</html>
